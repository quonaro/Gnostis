build:
  show: true
  script: |
    set -euo pipefail

    echo "==> Building Go binary..."
    COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
    go build -ldflags="-s -w -X main.version=$COMMIT" -o gnostis ./cmd/gnostis

    echo "==> Build complete: ./gnostis"

dev:
  desc: Run gnostis with live reload
  script: air
  vars:
  - "import:env .env"

push:
  desc: Push to GitHub
  color: cyan
  args:
  - "tag:str?"
  script: |
    if [ -n $tag ]; then
      git tag -f $tag
      git push origin $tag --force
      git push
    else
      git push origin main
    fi

install:
  depends:
  - "build"
  script: |
    set -euo pipefail

    sudo cp gnostis /usr/local/bin/gnostis
    echo "==> Installed: /usr/local/bin/gnostis"

    config_dir="$HOME/.gnostis"
    config_path="$config_dir/config.yaml"
    mkdir -p "$config_dir"

    if [ -f "$config_path" ]; then
      echo "==> Config already exists: $config_path (skipped)"
    else
      cp config.yaml "$config_path"
      echo "==> Installed config: $config_path"
    fi
