build:
  show: true
  script: |
    set -euo pipefail

    echo "==> Building Go binary..."
    COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
    go build -ldflags="-s -w -X main.version=$COMMIT" -o gnostis ./cmd/gnostis

    echo "==> Build complete: ./gnostis"

dev:
  desc: Run gnostis with live reload
  script: air
  vars:
  - "import:env .env"

push:
  desc: Push to GitHub
  color: cyan
  args:
  - "tag:str?"
  script: |
    if [ -n $tag ]; then
      git tag -f $tag
      git push origin $tag --force
      git push
    else
      git push origin main
    fi

install:
  depends:
  - "build"
  script: |
    set -euo pipefail

    bin_dir="$HOME/.local/bin"
    bin_path="$bin_dir/gnostis"
    config_dir="$HOME/.gnostis"
    config_path="$config_dir/config.yaml"
    unit_dir="$HOME/.config/systemd/user"
    unit_path="$unit_dir/gnostis.service"

    mkdir -p "$bin_dir" "$config_dir" "$unit_dir"

    cp gnostis "$bin_path"
    chmod +x "$bin_path"
    echo "==> Installed: $bin_path"

    if [ -f "$config_path" ]; then
      echo "==> Config already exists: $config_path (skipped)"
    else
      cp config.yaml "$config_path"
      echo "==> Installed config: $config_path"
    fi

    cp systemd/gnostis.service "$unit_path"
    echo "==> Installed systemd unit: $unit_path"

    systemctl --user daemon-reload
    systemctl --user enable --now gnostis
    echo "==> Gnostis service started and enabled"
