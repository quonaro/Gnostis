build:
  show: true
  script: |
    set -euo pipefail

    echo "==> Building Go binary..."
    COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
    go build -ldflags="-s -w -X main.version=$COMMIT" -o gnostis ./cmd/gnostis

    echo "==> Build complete: ./gnostis"

dev:
  desc: Run gnostis with live reload
  script: air
  vars:
  - "import:env .env"

push:
  desc: Push to GitHub
  color: cyan
  args:
  - "tag:str?"
  script: |
    if [ -n $tag ]; then
      git tag -f $tag
      git push origin $tag --force
      git push
    else
      git push origin main
    fi

service:
  install:
    depends:
    - "build"
    script: |
      systemctl --user stop gnostis && ./gnostis install && systemctl --user start gnostis
  stop:
    script: |
      systemctl --user stop gnostis
  start:
    script: |
      systemctl --user start gnostis
