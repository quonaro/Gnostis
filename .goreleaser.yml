version: 2

project_name: gnostis

builds:
- id: gnostis
  binary: gnostis
  main: ./cmd/gnostis
  env:
  - CGO_ENABLED=1
  - GOTOOLCHAIN=auto
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  overrides:
  - goos: linux
    goarch: amd64
    env:
    - CC=x86_64-linux-gnu-gcc
    - CXX=x86_64-linux-gnu-g++
  - goos: linux
    goarch: arm64
    env:
    - CC=aarch64-linux-gnu-gcc
    - CXX=aarch64-linux-gnu-g++
  - goos: darwin
    goarch: amd64
    env:
    - CC=o64-clang
    - CXX=o64-clang++
  - goos: darwin
    goarch: arm64
    env:
    - CC=oa64-clang
    - CXX=oa64-clang++

archives:
- id: gnostis
  ids:
  - gnostis
  name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
  formats:
  - tar.gz
  files: []

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: quonaro
    name: GnostisMCP
  name_template: "{{ .ProjectName }} {{ .Version }}"
