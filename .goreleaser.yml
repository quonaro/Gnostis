version: 2

project_name: gnostis

builds:
- id: gnostis
  binary: gnostis
  main: ./cmd/gnostis
  env:
  - CGO_ENABLED=1
  - GOTOOLCHAIN=auto
  goos:
  - linux
  - windows
  - darwin
  goarch:
  - amd64
  - arm64
  tags:
  - no_onnx
  overrides:
  - goos: linux
    goarch: amd64
    env:
    - CC=x86_64-linux-gnu-gcc
    - CXX=x86_64-linux-gnu-g++
  - goos: linux
    goarch: arm64
    env:
    - CC=aarch64-linux-gnu-gcc
    - CXX=aarch64-linux-gnu-g++
  - goos: windows
    goarch: amd64
    env:
    - CC=x86_64-w64-mingw32-gcc
    - CXX=x86_64-w64-mingw32-g++
  - goos: darwin
    goarch: amd64
    env:
    - CC=o64-clang
    - CXX=o64-clang++
  - goos: darwin
    goarch: arm64
    env:
    - CC=oa64-clang
    - CXX=oa64-clang++

- id: gnostis-onnx
  binary: gnostis
  main: ./cmd/gnostis
  env:
  - CGO_ENABLED=1
  - GOTOOLCHAIN=auto
  goos:
  - linux
  goarch:
  - amd64
  - arm64
  overrides:
  - goos: linux
    goarch: amd64
    env:
    - CC=x86_64-linux-gnu-gcc
    - CXX=x86_64-linux-gnu-g++
  - goos: linux
    goarch: arm64
    env:
    - CC=aarch64-linux-gnu-gcc
    - CXX=aarch64-linux-gnu-g++

archives:
- id: gnostis
  builds:
  - gnostis
  name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
  format: tar.gz
  files: []
  format_overrides:
  - goos: windows
    format: zip

- id: gnostis-onnx
  builds:
  - gnostis-onnx
  name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}-onnx"
  format: tar.gz
  files: []

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  name_template: "{{ .ProjectName }} {{ .Version }}"
