run:
  desc: Start the Gnostis server
  native: true

version:
  desc: Show version
  native: true

index:
  desc: Index management commands
  color: cyan
  inherit_color: true
  rebuild:
    desc: Rebuild the full index
    native: true
  status:
    desc: Show index status
    native: true

config:
  desc: Configuration commands
  color: blue
  inherit_color: true
  validate:
    desc: Validate config without starting the server
    native: true
  show:
    desc: Show interpolated config with secrets masked
    native: true
  discover:
    desc: Discover projects under a directory and add them to config
    native: true
    args:
    - "path:str"
    - "git:bool=false"
    - "go:bool=false"
    - "nm:bool=false"
    - "venv:bool=false"
    - "backup:bool=false"
